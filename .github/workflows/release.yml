name: Build & Release Streamflix

on:
  push:
    tags:
      - 'v*' # Si attiva solo quando crei un tag (es. v1.0.0)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configurazione Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Inserimento Chiave TMDB
        env:
          TMDB_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          echo "TMDB_API_KEY=$TMDB_KEY" >> local.properties

      - name: Permessi Gradle
        run: chmod +x ./gradlew

      - name: Build APK (Versione Universale)
        run: ./gradlew assembleDebug --stacktrace

      - name: Crea Release e Carica APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: ${{ github.ref_name }}
          name: Streamflix Release ${{ github.ref_name }}
          body: "Nuovo aggiornamento di Streamflix! Scarica l'APK qui sotto."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}