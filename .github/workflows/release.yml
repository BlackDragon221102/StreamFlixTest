name: Build & Release Streamflix

on:
  push:
    tags:
      - 'v*' # Si attiva solo quando crei un tag (es. v1.0.1)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configurazione Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Inserimento Chiave TMDB
        env:
          TMDB_KEY: ${{ secrets.TMDB_API_KEY }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "APP_LAYOUT=mobile" >> local.properties
          echo "TMDB_API_KEY=$TMDB_KEY" >> local.properties
          echo "SUBDL_API_KEY=" >> local.properties
          echo "RABBITSTREAM_SOURCE_API=" >> local.properties
          echo "RELEASE_STORE_FILE=release-keystore.jks" >> local.properties
          echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> local.properties
          echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> local.properties
          echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> local.properties

      - name: Crea keystore release
	env:
		RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
  	run: |
    		echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks


      - name: Permessi Gradle
        run: chmod +x ./gradlew

      - name: Build APK Release
        run: ./gradlew assembleRelease --stacktrace

      - name: Trova APK Release
        id: find_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -maxdepth 1 -name "*.apk" ! -name "*-unsigned.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find app/build/outputs/apk/release -maxdepth 1 -name "*.apk" | head -n 1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "Nessun APK trovato nella cartella release"
            ls -R app/build/outputs/apk || true
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Rinomina APK con Versione
        # Rinomina il primo APK generato in release con il nome versione desiderato
        run: mv "${{ steps.find_apk.outputs.apk_path }}" "app/build/outputs/apk/release/StreamFlix-${{ github.ref_name }}.apk"

      - name: Crea Release e Carica APK
        uses: softprops/action-gh-release@v2
        with:
          # Qui diciamo di caricare il file con il nuovo nome
          files: app/build/outputs/apk/release/StreamFlix-${{ github.ref_name }}.apk
          tag_name: ${{ github.ref_name }}
          name: Streamflix Release ${{ github.ref_name }}
          body: |
            Nuovo aggiornamento di Streamflix.

            APK allegato:
            - StreamFlix-${{ github.ref_name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
